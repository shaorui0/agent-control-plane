agent_id: code-reviewer-agent
owner: rshao@datavisor.com
version: 1.0.0
model_version: claude-opus-4-7
description: "Reviews pull requests: reads diffs and runbooks; posts review comments to Slack."
task_classes:
  - name: review_pr
    slo_sli_kind: judge_pass_rate
    slo_target: 0.80
    slo_window: 7d
    slo_budget_class: organic
sealed_tools:
  - name: git_diff
    max_tier: T1
    requires_intent: false
  - name: runbook_search
    max_tier: T1
    requires_intent: false
  - name: slack_post
    max_tier: T2
    requires_intent: false
budget_hourly_usd: 3.00
budget_hourly_tokens: 300000
default_tier: T1
